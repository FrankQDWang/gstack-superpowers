version: 1
policy:
  one_execution_owner: true
  native_codex_review:
    standalone_codex_review_owner: forbidden
    codex_review_inside_gstack_review: allowed_when_managed_by_raw_gstack_review
    allowed_second_opinion:
      - raw-gstack-review
      - gstack-claude
      - curated-readonly-reviewer-subagent
  common_safety:
    disabled_reference_side_effects:
      - telemetry
      - analytics
      - timeline
      - question-log
      - routing-injection
      - lake-intro
      - upgrade-check
    inert_historical_routes:
      - native/generic host review
      - raw upstream status-table review routes
  release_gate:
    default_route: readiness_report
    explicit_gate_required: true
    requests:
      - release
      - deploy
      - canary
      - merge
      - push
  default_review_chain:
    - superpowers/skills/requesting-code-review/SKILL.md
    - gstack/review/SKILL.md
    - superpowers/skills/receiving-code-review/SKILL.md

upstreams:
  gstack:
    repo: https://github.com/garrytan/gstack.git
    branch: main
  superpowers:
    repo: https://github.com/obra/superpowers.git
    branch: main

